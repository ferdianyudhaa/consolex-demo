<!DOCTYPE html>
<html>
<head>
    <title>Simulasi Pra UTS - Ferdian</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            margin: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 10px;
            display: flex;
            gap: 10px;
            background: #fff;
            height: 350px;
        }
        textarea {
            width: 140px;
            height: 330px;
            resize: none;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #999;
            padding: 5px;
            white-space: pre-wrap;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 80px;
        }
        button {
            padding: 5px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            background-color: #f0f0f0;
            border: 1px solid #999;
            cursor: pointer;
        }
        button:disabled {
            color: #aaa;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            cursor: not-allowed;
        }
        button.active-border {
            border: 2px solid #000;
            font-weight: bold;
        }
        .canvas-container {
            width: 270px;
            height: 330px;
            border: 1px solid #ccc;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <textarea id="ta1"></textarea>
            <div class="buttons">
                <button id="wipe-1" onclick="wipe(1)">wipe-1</button>
                <button id="data-1" onclick="data1()">data-1</button>
                <button id="read-1" onclick="read1()" disabled>read-1</button>
                <button id="exec-1" onclick="exec1()" disabled>exec-1</button>
            </div>
            <div class="canvas-container"><canvas id="cv1" width="270" height="330"></canvas></div>
        </div>

        <div class="panel">
            <textarea id="ta2"></textarea>
            <div class="buttons">
                <button id="wipe-2" onclick="wipe(2)">wipe-2</button>
                <button id="data-2" onclick="data2()" disabled>data-2</button>
                <button id="read-2" onclick="read2()" disabled>read-2</button>
                <button id="exec-2" onclick="exec2()" disabled>exec-2</button>
            </div>
            <div class="canvas-container"><canvas id="cv2" width="270" height="330"></canvas></div>
        </div>

        <div class="panel">
            <textarea id="ta3"></textarea>
            <div class="buttons">
                <button id="wipe-3" onclick="wipe(3)">wipe-3</button>
                <button id="data-3" onclick="data3()" disabled>data-3</button>
                <button id="read-3" onclick="read3()" disabled>read-3</button>
                <button id="exec-3" onclick="exec3()" disabled>exec-3</button>
            </div>
            <div class="canvas-container"><canvas id="cv3" width="270" height="330"></canvas></div>
        </div>

        <div class="panel">
            <textarea id="ta4"></textarea>
            <div class="buttons">
                <button id="wipe-4" onclick="wipe(4)">wipe-4</button>
                <button id="data-4" onclick="data4()" disabled>data-4</button>
                <button id="read-4" onclick="read4()" disabled>read-4</button>
                <button id="exec-4" onclick="exec4()" disabled>exec-4</button>
            </div>
            <div class="canvas-container"><canvas id="cv4" width="270" height="330"></canvas></div>
        </div>
    </div>

    <script>
        // Variabel Global
        let cols = 9, rows = 11, umin = 0.2, umax = 0.7, unum = 11;
        let gridData = [];
        let colors = [];
        let startPt = {x: 4, y: 5}; // Hijau
        let endPt = {x: 6, y: 2};   // Biru
        const cellSize = 30;

        function setBtn(id, enabled, highlight = false) {
            const btn = document.getElementById(id);
            btn.disabled = !enabled;
            if(highlight) btn.classList.add('active-border');
            else btn.classList.remove('active-border');
        }

        function wipe(panel) {
            document.getElementById('ta' + panel).value = '';
            const ctx = document.getElementById('cv' + panel).getContext('2d');
            ctx.clearRect(0, 0, 270, 330);
            
            // Reset state tombol sesuai panel
            if(panel === 1) {
                setBtn('data-1', true); setBtn('read-1', false); setBtn('exec-1', false);
            } else if(panel === 2) {
                setBtn('data-2', !document.getElementById('read-1').disabled); 
                setBtn('read-2', false); setBtn('exec-2', false);
            } else if(panel === 3) {
                setBtn('data-3', !document.getElementById('read-2').disabled); 
                setBtn('read-3', false); setBtn('exec-3', false);
            } else if(panel === 4) {
                setBtn('data-4', !document.getElementById('read-3').disabled); 
                setBtn('read-4', false); setBtn('exec-4', false);
            }
        }

        // --- PANEL 1 LOGIC ---
        function data1() {
            document.getElementById('ta1').value = "COLS 9\nROWS 11\nUMIN 0.20\nUMAX 0.70\nUNUM 11\nSEPC ;";
            setBtn('data-1', true, true);
            setBtn('read-1', true);
        }

        function read1() {
            setBtn('data-1', true, false);
            setBtn('read-1', true, true);
            setBtn('exec-1', true);
            setBtn('data-2', true); // Mengaktifkan data-2
        }

        function exec1() {
            setBtn('read-1', true, false);
            setBtn('exec-1', true, true);
            
            let dataStr = "\n";
            gridData = [];
            for(let r=0; r<rows; r++) {
                let rowVals = [];
                for(let c=0; c<cols; c++) {
                    // Generate random antara UMIN dan UMAX
                    let val = (Math.random() * (umax - umin) + umin).toFixed(2);
                    rowVals.push(parseFloat(val));
                    dataStr += val.substring(1) + (c === cols-1 ? "" : ";");
                }
                gridData.push(rowVals);
                dataStr += "\n";
            }
            // Append data ke textarea 1
            let currentText = document.getElementById('ta1').value;
            // Bersihkan data lama jika di klik exec berkali-kali
            if(currentText.includes(";")) {
                currentText = currentText.substring(0, currentText.indexOf("\n.") || currentText.indexOf("\n0."));
            }
            document.getElementById('ta1').value = currentText.trim() + dataStr;
        }

        // --- PANEL 2 LOGIC ---
        function data2() {
            document.getElementById('ta2').value = "CNUM 11\nCL00 #522\nCL01 #622\nCL02 #722\nCL03 #822\nCL04 #922\nCL05 #a22\nCL06 #b22\nCL07 #c22\nCL08 #d22\nCL09 #e22\nCL10 #f22";
            setBtn('data-2', true, true);
            setBtn('read-2', true);
        }

        function read2() {
            setBtn('data-2', true, false);
            setBtn('read-2', true, true);
            setBtn('exec-2', true);
            setBtn('data-3', true);
            
            // Parsing warna
            const lines = document.getElementById('ta2').value.split('\n');
            colors = [];
            lines.forEach(line => {
                if(line.startsWith('CL')) colors.push(line.split(' ')[1]);
            });
        }

        function exec2() {
            setBtn('read-2', true, false);
            setBtn('exec-2', true, true);
            drawHeatmap('cv2');
        }

        // --- PANEL 3 LOGIC ---
        function data3() {
            document.getElementById('ta3').value = "XMIN 0\nYMIN 0\nXMAX 9\nYMAX 11\nSX 4\nSY 5\nEX 6\nEY 2";
            setBtn('data-3', true, true);
            setBtn('read-3', true);
        }

        function read3() {
            setBtn('data-3', true, false);
            setBtn('read-3', true, true);
            setBtn('exec-3', true);
            setBtn('data-4', true);
        }

        function exec3() {
            setBtn('read-3', true, false);
            setBtn('exec-3', true, true);
            drawHeatmap('cv3');
            
            const ctx = document.getElementById('cv3').getContext('2d');
            // Gambar Start Hijau
            ctx.fillStyle = '#80ff80';
            ctx.fillRect(startPt.x * cellSize, startPt.y * cellSize, cellSize, cellSize);
            // Gambar End Biru
            ctx.fillStyle = '#8080ff';
            ctx.fillRect(endPt.x * cellSize, endPt.y * cellSize, cellSize, cellSize);
        }

        // --- PANEL 4 LOGIC (LINTASAN) ---
        function data4() {
            document.getElementById('ta4').value = "ALG DIJKSTRA\nCOST MU\nPATH LINE\nCOLOR #FFD700\nWIDTH 3";
            setBtn('data-4', true, true);
            setBtn('read-4', true);
        }

        function read4() {
            setBtn('data-4', true, false);
            setBtn('read-4', true, true);
            setBtn('exec-4', true);
        }

        function exec4() {
            setBtn('read-4', true, false);
            setBtn('exec-4', true, true);
            
            // Gambar Ulang Heatmap dan Titik
            drawHeatmap('cv4');
            const ctx = document.getElementById('cv4').getContext('2d');
            ctx.fillStyle = '#80ff80'; ctx.fillRect(startPt.x * cellSize, startPt.y * cellSize, cellSize, cellSize);
            ctx.fillStyle = '#8080ff'; ctx.fillRect(endPt.x * cellSize, endPt.y * cellSize, cellSize, cellSize);

            // Cari Jalur
            let path = calculateDijkstra();
            
            // Gambar Jalur
            if(path.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#FFD700'; // Kuning Terang
                ctx.lineWidth = 3;
                for (let i = 0; i < path.length; i++) {
                    let px = (path[i].x * cellSize) + (cellSize / 2);
                    let py = (path[i].y * cellSize) + (cellSize / 2);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
            }
        }

        // --- FUNGSI BANTUAN ---
        function drawHeatmap(canvasId) {
            if(gridData.length === 0 || colors.length === 0) return;
            const ctx = document.getElementById(canvasId).getContext('2d');
            ctx.clearRect(0, 0, 270, 330);
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let val = gridData[y][x];
                    let idx = Math.floor(((val - umin) / (umax - umin)) * unum);
                    if (idx < 0) idx = 0; if (idx >= unum) idx = unum - 1;
                    
                    ctx.fillStyle = colors[idx];
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
        }

        function calculateDijkstra() {
            if(gridData.length === 0) return [];
            let dist = Array(rows).fill().map(() => Array(cols).fill(Infinity));
            let prev = Array(rows).fill().map(() => Array(cols).fill(null));
            let pq = [];

            dist[startPt.y][startPt.x] = gridData[startPt.y][startPt.x];
            pq.push({x: startPt.x, y: startPt.y, cost: dist[startPt.y][startPt.x]});

            const dx = [0, 0, 1, -1];
            const dy = [1, -1, 0, 0];

            while (pq.length > 0) {
                pq.sort((a, b) => a.cost - b.cost);
                let current = pq.shift();

                let cx = current.x, cy = current.y;
                if (cx === endPt.x && cy === endPt.y) break;

                for (let i = 0; i < 4; i++) {
                    let nx = cx + dx[i], ny = cy + dy[i];
                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                        let newCost = dist[cy][cx] + gridData[ny][nx];
                        if (newCost < dist[ny][nx]) {
                            dist[ny][nx] = newCost;
                            prev[ny][nx] = {x: cx, y: cy};
                            pq.push({x: nx, y: ny, cost: newCost});
                        }
                    }
                }
            }

            let path = [];
            let curr = {x: endPt.x, y: endPt.y};
            while (curr != null) {
                path.push(curr);
                curr = prev[curr.y][curr.x];
            }
            return path.reverse();
        }
    </script>
</body>
</html>
