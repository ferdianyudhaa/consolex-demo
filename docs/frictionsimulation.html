<!DOCTYPE html>
<html>
<head>
    <title>Simulasi Pra UTS - Ferdian</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #fff; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; }
        .panel { border: 1px solid #ccc; padding: 10px; display: flex; gap: 10px; background: #fff; height: 350px; }
        textarea.ta-left { width: 140px; height: 330px; resize: none; font-family: monospace; font-size: 13px; border: 1px solid #999; padding: 5px; }
        textarea.ta-right { width: 270px; height: 330px; resize: none; font-family: monospace; font-size: 13px; border: 1px solid #ccc; padding: 5px; background-color: #fafafa; }
        .buttons { display: flex; flex-direction: column; gap: 8px; width: 85px; }
        button { padding: 5px; font-size: 12px; background-color: #f0f0f0; border: 1px solid #999; cursor: pointer; }
        button:disabled { color: #aaa; border: 1px solid #ccc; background-color: #f9f9f9; cursor: not-allowed; }
        button.active-border { border: 2px solid #000; font-weight: bold; }
        .canvas-container { width: 270px; height: 330px; border: 1px solid #ccc; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <textarea id="ta1" class="ta-left"></textarea>
            <div class="buttons">
                <button id="wipe-1" onclick="wipe(1)">wipe-1</button>
                <button id="data-1" onclick="data1()">data-1</button>
                <button id="read-1" onclick="read1()" disabled>read-1</button>
                <button id="exec-1" onclick="exec1()" disabled>exec-1</button>
            </div>
            <textarea id="out1" class="ta-right" readonly></textarea>
        </div>

        <div class="panel">
            <textarea id="ta2" class="ta-left"></textarea>
            <div class="buttons">
                <button id="wipe-2" onclick="wipe(2)">wipe-2</button>
                <button id="data-2" onclick="data2()" disabled>data-2</button>
                <button id="read-2" onclick="read2()" disabled>read-2</button>
                <button id="exec-2" onclick="exec2()" disabled>exec-2</button>
            </div>
            <div class="canvas-container"><canvas id="cv2" width="270" height="330"></canvas></div>
        </div>

        <div class="panel">
            <textarea id="ta3" class="ta-left"></textarea>
            <div class="buttons">
                <button id="wipe-3" onclick="wipe(3)">wipe-3</button>
                <button id="data-3" onclick="data3()" disabled>data-3</button>
                <button id="read-3" onclick="read3()" disabled>read-3</button>
                <button id="exec-3" onclick="exec3()" disabled>exec-3</button>
            </div>
            <div class="canvas-container"><canvas id="cv3" width="270" height="330"></canvas></div>
        </div>

        <div class="panel">
            <textarea id="ta4" class="ta-left"></textarea>
            <div class="buttons">
                <button id="wipe-4" onclick="wipe(4)">wipe-4</button>
                <button id="data-4" onclick="data4()" disabled>data-4</button>
                <button id="read-4" onclick="read4()" disabled>read-4</button>
                <button id="exec-4" onclick="exec4()" disabled>exec-4</button>
            </div>
            <div class="canvas-container"><canvas id="cv4" width="270" height="330"></canvas></div>
        </div>
    </div>

    <script>
        let cols = 9, rows = 11, umin = 0.2, umax = 0.7, unum = 11;
        let gridData = [], colors = [], startPt = {x: 4, y: 5}, endPt = {x: 6, y: 2};
        const cellSize = 30;

        function setBtn(id, enabled, highlight = false) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.disabled = !enabled;
            if(highlight) btn.style.border = "2px solid black";
            else btn.style.border = "1px solid #999";
        }

        function wipe(p) {
            if(p===1){ document.getElementById('ta1').value=''; document.getElementById('out1').value=''; setBtn('read-1',false); setBtn('exec-1',false); }
            else { document.getElementById('ta'+p).value=''; let ctx=document.getElementById('cv'+p).getContext('2d'); ctx.clearRect(0,0,270,330); setBtn('read-'+p,false); setBtn('exec-'+p,false); }
        }

        // PANEL 1
        function data1() {
            document.getElementById('ta1').value = "COLS 9\nROWS 11\nUMIN 0.20\nUMAX 0.70\nUNUM 11\nSEPC ;";
            setBtn('data-1', true, true);
            setBtn('read-1', true);
        }
        function read1() {
            setBtn('data-1', true, false);
            setBtn('read-1', true, true);
            setBtn('exec-1', true);
            setBtn('data-2', true);
        }
        function exec1() {
            setBtn('exec-1', true, true);
            let ds = ""; gridData = [];
            for(let r=0; r<rows; r++){
                let rv = [];
                for(let c=0; c<cols; c++){
                    let v = (Math.random()*(umax-umin)+umin).toFixed(2);
                    rv.push(parseFloat(v));
                    ds += v.substring(1) + (c===cols-1?"":";");
                }
                gridData.push(rv);
                ds += (r===rows-1?"":"\n");
            }
            document.getElementById('out1').value = ds;
        }

        // PANEL 2
        function data2() {
            document.getElementById('ta2').value = "CNUM 11\nCL00 #522\nCL01 #622\nCL02 #722\nCL03 #822\nCL04 #922\nCL05 #a22\nCL06 #b22\nCL07 #c22\nCL08 #d22\nCL09 #e22\nCL10 #f22";
            setBtn('data-2', true, true); setBtn('read-2', true);
        }
        function read2() {
            setBtn('read-2', true, true); setBtn('exec-2', true); setBtn('data-3', true);
            colors = [];
            document.getElementById('ta2').value.split('\n').forEach(l => { if(l.startsWith('CL')) colors.push(l.split(' ')[1]); });
        }
        function exec2() { drawHeatmap('cv2'); }

        // PANEL 3
        function data3() {
            document.getElementById('ta3').value = "XMIN 0\nYMIN 0\nXMAX 9\nYMAX 11\nSX 4\nSY 5\nEX 6\nEY 2";
            setBtn('data-3', true, true); setBtn('read-3', true);
        }
        function read3() { setBtn('read-3', true, true); setBtn('exec-3', true); setBtn('data-4', true); }
        function exec3() {
            drawHeatmap('cv3');
            let ctx = document.getElementById('cv3').getContext('2d');
            ctx.fillStyle = '#80ff80'; ctx.fillRect(startPt.x*cellSize, startPt.y*cellSize, cellSize, cellSize);
            ctx.fillStyle = '#8080ff'; ctx.fillRect(endPt.x*cellSize, endPt.y*cellSize, cellSize, cellSize);
        }

        // PANEL 4
        function data4() {
            document.getElementById('ta4').value = "ALG DIJKSTRA\nCOST MU\nPATH LINE\nCOLOR #FFD700\nWIDTH 3";
            setBtn('data-4', true, true); setBtn('read-4', true);
        }
        function read4() { setBtn('read-4', true, true); setBtn('exec-4', true); }
        function exec4() {
            drawHeatmap('cv4');
            let ctx = document.getElementById('cv4').getContext('2d');
            ctx.fillStyle = '#80ff80'; ctx.fillRect(startPt.x*cellSize, startPt.y*cellSize, cellSize, cellSize);
            ctx.fillStyle = '#8080ff'; ctx.fillRect(endPt.x*cellSize, endPt.y*cellSize, cellSize, cellSize);
            let path = calculateDijkstra();
            if(path.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
                path.forEach((p, i) => {
                    let x = p.x*cellSize + cellSize/2, y = p.y*cellSize + cellSize/2;
                    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            }
        }

        function drawHeatmap(id) {
            if(!gridData.length || !colors.length) return;
            let ctx = document.getElementById(id).getContext('2d');
            ctx.clearRect(0, 0, 270, 330);
            for(let y=0; y<rows; y++){
                for(let x=0; x<cols; x++){
                    let idx = Math.floor(((gridData[y][x]-umin)/(umax-umin))*unum);
                    ctx.fillStyle = colors[Math.min(Math.max(idx,0), unum-1)];
                    ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
                }
            }
        }

        function calculateDijkstra() {
            if(!gridData.length) return [];
            let dist = Array(rows).fill().map(()=>Array(cols).fill(Infinity)), prev = Array(rows).fill().map(()=>Array(cols).fill(null)), pq = [];
            dist[startPt.y][startPt.x] = gridData[startPt.y][startPt.x];
            pq.push({x: startPt.x, y: startPt.y, c: dist[startPt.y][startPt.x]});
            while(pq.length){
                pq.sort((a,b)=>a.c-b.c); let curr = pq.shift();
                if(curr.x===endPt.x && curr.y===endPt.y) break;
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{
                    let nx = curr.x+dx, ny = curr.y+dy;
                    if(nx>=0 && nx<cols && ny>=0 && ny<rows){
                        let cost = dist[curr.y][curr.x] + gridData[ny][nx];
                        if(cost < dist[ny][nx]){ dist[ny][nx]=cost; prev[ny][nx]={x:curr.x, y:curr.y}; pq.push({x:nx, y:ny, c:cost}); }
                    }
                });
            }
            let res = [], c = {x:endPt.x, y:endPt.y};
            while(c){ res.push(c); c = prev[c.y][c.x]; }
            return res.reverse();
        }
    </script>
</body>
</html>
